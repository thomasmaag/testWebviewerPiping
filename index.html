<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Piping Web Viewer</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #f4f6f8;
            color: #17202a;
            font-family: Arial, Helvetica, sans-serif;
        }

        #viewer {
            width: 100%;
            height: 100%;
        }

        #status {
            position: fixed;
            top: 12px;
            left: 12px;
            padding: 6px 9px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 1px 5px rgba(15, 23, 42, 0.18);
            color: #17202a;
            font-size: 13px;
            line-height: 1.3;
            pointer-events: none;
        }

        #status.hidden {
            display: none;
        }

        #status.error {
            color: #8a1f17;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="status">Loading model.glb...</div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./viewer.js"></script>
</body>
</html>
