<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Piping Web Viewer</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #f4f6f8;
            color: #17202a;
            font-family: Arial, Helvetica, sans-serif;
        }

        #viewer {
            width: 100%;
            height: 100%;
        }

        body.measure-active #viewer,
        body.measure-active canvas {
            cursor: crosshair;
        }

        #controls-panel {
            position: fixed;
            top: 12px;
            left: 12px;
            width: 230px;
            max-width: calc(100vw - 24px);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.18);
            color: #17202a;
            font-size: 13px;
            line-height: 1.35;
            overflow: hidden;
            z-index: 2;
        }

        #controls-panel.collapsed {
            width: auto;
        }

        .controls-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 9px;
        }

        .controls-title {
            font-size: 14px;
            font-weight: 700;
        }

        #controls-toggle,
        #reset-view,
        #measure-toggle,
        #measure-result-close {
            border: 1px solid rgba(23, 32, 42, 0.22);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.88);
            color: #17202a;
            font: inherit;
            cursor: pointer;
        }

        #controls-toggle {
            padding: 3px 7px;
        }

        .controls-body {
            padding: 0 10px 10px;
        }

        #controls-panel.collapsed .controls-body {
            display: none;
        }

        .controls-body ul {
            margin: 0 0 9px 17px;
            padding: 0;
        }

        .controls-body li {
            margin: 3px 0;
        }

        .controls-actions {
            display: grid;
            gap: 6px;
        }

        #reset-view,
        #measure-toggle {
            width: 100%;
            padding: 6px 8px;
            font-weight: 600;
        }

        #measure-toggle.active {
            border-color: rgba(25, 111, 61, 0.65);
            background: #196f3d;
            color: #ffffff;
        }

        #controls-toggle:hover,
        #reset-view:hover,
        #measure-toggle:hover,
        #measure-result-close:hover {
            background: #ffffff;
        }

        #measure-toggle.active:hover {
            background: #145a32;
        }

        #measure-result {
            position: fixed;
            right: 12px;
            bottom: 12px;
            width: 245px;
            max-width: calc(100vw - 24px);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.2);
            color: #17202a;
            font-size: 13px;
            line-height: 1.35;
            z-index: 4;
        }

        #measure-result.hidden {
            display: none;
        }

        .measure-result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 9px;
            border-bottom: 1px solid rgba(23, 32, 42, 0.12);
        }

        .measure-result-title {
            font-size: 14px;
            font-weight: 700;
        }

        #measure-result-close {
            padding: 3px 7px;
        }

        .measure-result-body {
            display: grid;
            gap: 5px;
            padding: 9px 10px 10px;
        }

        .measure-result-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .measure-result-row span:last-child {
            font-weight: 700;
        }

        #status {
            position: fixed;
            top: 12px;
            right: 12px;
            max-width: calc(100vw - 24px);
            padding: 6px 9px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 1px 5px rgba(15, 23, 42, 0.18);
            color: #17202a;
            font-size: 13px;
            line-height: 1.3;
            pointer-events: none;
            z-index: 3;
        }

        #status.hidden {
            display: none;
        }

        #status.error {
            color: #8a1f17;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="controls-panel" aria-label="Viewer controls">
        <div class="controls-header">
            <div class="controls-title">Controls</div>
            <button id="controls-toggle" type="button" aria-expanded="true" aria-controls="controls-body">Hide</button>
        </div>
        <div id="controls-body" class="controls-body">
            <ul>
                <li>Left mouse drag: Rotate</li>
                <li>Right mouse drag: Pan</li>
                <li>Mouse wheel: Zoom</li>
                <li>Reset View button: Fit model to view</li>
                <li>Measure button: Pick two model points</li>
            </ul>
            <div class="controls-actions">
                <button id="reset-view" type="button">Reset View</button>
                <button id="measure-toggle" type="button">Measure</button>
            </div>
        </div>
    </div>
    <div id="measure-result" class="hidden" aria-label="Measurement result">
        <div class="measure-result-header">
            <div class="measure-result-title">Measurement</div>
            <button id="measure-result-close" type="button">Close</button>
        </div>
        <div class="measure-result-body">
            <div class="measure-result-row"><span>Distance</span><span id="measure-distance">-</span></div>
            <div class="measure-result-row"><span>&Delta;X</span><span id="measure-delta-x">-</span></div>
            <div class="measure-result-row"><span>&Delta;Y</span><span id="measure-delta-y">-</span></div>
            <div class="measure-result-row"><span>&Delta;Z</span><span id="measure-delta-z">-</span></div>
        </div>
    </div>
    <div id="status">Loading model.glb...</div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./viewer.js"></script>
</body>
</html>
