<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Piping Web Viewer</title>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #f4f6f8;
            color: #17202a;
            font-family: Arial, Helvetica, sans-serif;
        }

        #viewer {
            width: 100%;
            height: 100%;
        }

        #controls-panel {
            position: fixed;
            top: 12px;
            left: 12px;
            width: 230px;
            max-width: calc(100vw - 24px);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.18);
            color: #17202a;
            font-size: 13px;
            line-height: 1.35;
            overflow: hidden;
            z-index: 2;
        }

        #controls-panel.collapsed {
            width: auto;
        }

        .controls-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 9px;
        }

        .controls-title {
            font-size: 14px;
            font-weight: 700;
        }

        #controls-toggle,
        #reset-view {
            border: 1px solid rgba(23, 32, 42, 0.22);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.88);
            color: #17202a;
            font: inherit;
            cursor: pointer;
        }

        #controls-toggle {
            padding: 3px 7px;
        }

        .controls-body {
            padding: 0 10px 10px;
        }

        #controls-panel.collapsed .controls-body {
            display: none;
        }

        .controls-body ul {
            margin: 0 0 9px 17px;
            padding: 0;
        }

        .controls-body li {
            margin: 3px 0;
        }

        #reset-view {
            width: 100%;
            padding: 6px 8px;
            font-weight: 600;
        }

        #controls-toggle:hover,
        #reset-view:hover {
            background: #ffffff;
        }

        #status {
            position: fixed;
            top: 12px;
            right: 12px;
            max-width: calc(100vw - 24px);
            padding: 6px 9px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 1px 5px rgba(15, 23, 42, 0.18);
            color: #17202a;
            font-size: 13px;
            line-height: 1.3;
            pointer-events: none;
            z-index: 3;
        }

        #status.hidden {
            display: none;
        }

        #status.error {
            color: #8a1f17;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="controls-panel" aria-label="Viewer controls">
        <div class="controls-header">
            <div class="controls-title">Controls</div>
            <button id="controls-toggle" type="button" aria-expanded="true" aria-controls="controls-body">Hide</button>
        </div>
        <div id="controls-body" class="controls-body">
            <ul>
                <li>Left mouse drag: Rotate</li>
                <li>Right mouse drag: Pan</li>
                <li>Mouse wheel: Zoom</li>
                <li>Reset View button: Fit model to view</li>
            </ul>
            <button id="reset-view" type="button">Reset View</button>
        </div>
    </div>
    <div id="status">Loading model.glb...</div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="./viewer.js"></script>
</body>
</html>
